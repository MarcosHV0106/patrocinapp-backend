name: Integración backend

on:
  push:
    branches: [desarrollo, master]
  pull_request:
    branches: [desarrollo, master]

permissions:
  contents: read

jobs:
  verificar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Compilar, probar y verificar cobertura
        run: ./mvnw -B -ntp clean verify
      - name: Guardar reportes
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reportes-backend
          path: |
            target/surefire-reports
            target/site/jacoco
            target/*.jar
          if-no-files-found: warn
