spring.application.name=patrocinapp
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/patrocinapp}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:12MB}
patrocinapp.evidencias.max-bytes=${EVIDENCE_MAX_FILE_SIZE_BYTES:10485760}
patrocinapp.evidencias.tipos-permitidos=${EVIDENCE_ALLOWED_TYPES:image/jpeg,image/png,image/webp,application/pdf,video/mp4}

patrocinapp.jwt.secret=${JWT_SECRET:}
patrocinapp.jwt.expiration-ms=${JWT_EXPIRATION:86400000}
patrocinapp.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}
patrocinapp.comision.porcentaje=${PLATFORM_COMMISSION_PERCENT:10.00}

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

server.error.include-message=never
server.error.include-stacktrace=never
