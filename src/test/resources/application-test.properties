spring.datasource.url=jdbc:h2:mem:patrocinapp;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
spring.jpa.show-sql=false
patrocinapp.jwt.secret=PatrocinAppTestSecretOnlyForAutomatedTests2026
patrocinapp.jwt.expiration-ms=3600000
patrocinapp.cors.allowed-origins=http://localhost:4200
patrocinapp.evidencias.max-bytes=10485760
patrocinapp.evidencias.tipos-permitidos=image/jpeg,image/png,image/webp,application/pdf,video/mp4
